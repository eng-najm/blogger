<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blogger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: "Audiowide", sans-serif;
        font-weight: 400;
        font-style: normal;
      }

      #h-bg {
        padding-left: 15px;
        padding-right: 15px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        background-color: white;
        width: 100%;
        height: 60px;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .h-icon {
        height: 40px;
        width: 200px;
        background-size: contain;
        background-image: url("/images/logo.png");
        background-repeat: no-repeat;
      }

      #h-tp-right {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      a {
        text-decoration: none;
      }

      .h-nav-links {
        display: flex;
        gap: 15px;
      }

      .h-buttons {
        color: black;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .h-buttons:hover {
        color: aqua;
        transition: color 0.3s ease;
      }

      .h-signup-bt {
        color: white;
        background-color: black;
        padding: 10px 24px;
        font-size: 14px;
        border-radius: 6px;
        transition: background-color 0.3s ease;
      }

      .h-signup-bt:hover {
        background-color: #333;
      }

      .h-login-bt {
        color: black;
      }

      .h-login-bt:hover {
        color: aqua;
      }

      .section-home {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-image: url("/images/oooscillate.svg");
        background-color: #f5f5f5;
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        text-align: center;
        padding: 20px;
      }

      .section-home h2 {
        font-size: 2.625rem;
      }

      .section-home p {
        font-size: 1.25rem;
      }

      .section-home a {
        padding: 0.875rem 1.25rem;
        font-size: 0.8125rem;
        text-transform: uppercase;
        border-radius: 0.1875rem;
        color: white;
        background-color: black;
        transition: background-color 0.3s;
      }

      .section-home a:hover {
        background-color: #333;
      }

      #h-menu-burger {
        display: none;
        cursor: pointer;
      }

      #drop-down-menu {
        display: none;
      }

      #h-phone-links {
        display: none;
      }

      @media (max-width: 700px) {
        .h-nav-links {
          display: none;
        }

        #drop-down-menu {
          display: block;
          position: relative;
        }

        #h-menu-burger {
          display: block;
        }

        #drop-down-menu:hover #h-phone-links {
          display: flex;
          flex-direction: column;
          position: absolute;
          top: 40px;
          right: 0;
          background-color: white;
          min-width: 150px;
          border-radius: 8px;
          box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
          padding: 10px;
          gap: 15px;
        }

        .phone-links {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div id="h-bg">
        <a href="#" class="h-icon"></a>
        <div id="h-tp-right">
          <nav class="h-nav-links">
            <a class="h-home-bt h-buttons" href="#">
              <img src="images/home.svg" alt="" width="16px" height="16px" />
              Home
            </a>
            <a class="h-home-bt h-buttons" href="#">
              <img src="images/home.svg" alt="" width="16px" height="16px" />
              About
            </a>
            <a class="h-home-bt h-buttons" href="#">
              <img src="images/home.svg" alt="" width="16px" height="16px" />
              Earn
            </a>
          </nav>
          <a class="h-login-bt" href="#">Login</a>
          <a class="h-signup-bt" href="#">SignUp</a>

          <!-- قائمة الجوال المنسدلة -->
          <div id="drop-down-menu">
            <img
              id="h-menu-burger"
              src="/images/menu-burger.svg"
              alt="Menu"
              width="24px"
            />
            <div id="h-phone-links">
              <a class="h-home-bt h-buttons phone-links" href="#">
                <img src="images/home.svg" alt="" width="16px" height="16px" />
                Home
              </a>
              <a class="h-home-bt h-buttons phone-links" href="#">
                <img src="images/home.svg" alt="" width="16px" height="16px" />
                About
              </a>
              <a class="h-home-bt h-buttons phone-links" href="#">
                <img src="images/home.svg" alt="" width="16px" height="16px" />
                Earn
              </a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <section class="section-home">
      <h2>Publish your passions, your way</h2>
      <p>Create a unique and beautiful blog easily.</p>
      <a href="login.html">Create Blog</a>
    </section>
  </body>
</html>
