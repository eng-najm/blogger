<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width;initial-scale=1.0" />
    <meta name="description" content="Hello" />
    <meta name="keyword" />
    <title>Home</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      header {
        height: 56px;
        box-shadow: 0px 3px 4px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        gap: 15px;
        padding: 8px;
      }
      #left-side {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #acount-logo {
        height: 40px;
        width: 40px;
        display: inline-block;
        background-image: url("images/account.png");
        background-repeat: no-repeat;
        background-size: cover;
        border-radius: 100px;
        border-top: 3px solid black;
        border-left: 3px solid white;
        border-bottom: 3px solid black;
        border-right: 3px solid white;
        box-shadow: 0px 3px 1px rgba(0, 0, 0, 0.2);
      }
      #apps {
        height: 40px;
        width: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 8px;
      }
      img {
        width: 24px;
        height: 24px;
      }
      #searchbar {
        display: flex;
        border-radius: 28px;
        padding: 2px;
        overflow: hidden;
        background-color: rgb(236, 239, 241);
        border-radius: 12px;
        width: 100%;
        max-width: 780px;
        margin-left: auto;
        margin-right: auto;
      }
      input {
        display: block;
        background-color: transparent;
        border-radius: none;
        border: none;
        width: inherit;
      }
      input:focus {
        background-color: none;
        border-radius: none;
        outline: none;
      }
      #right-side {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }
      #right-side img {
        size: 50px 50px;
      }
      main {
        display: flex;
      }
      aside {
        padding: 8px;
        display: flex;
        flex-direction: column;
        width: 280px;
        height: 100vh;
        box-shadow: 4px 0px 4px rgba(0, 0, 0, 0.1);
      }
      section {
        width: calc(100vw - 280px);
        padding: 20px 30px;
      }
      #aside-new-button {
        margin-top: 15px;
        margin-left: 5px;
        color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        text-align: center;
        max-width: 140px;
        height: 40px;
        padding: 0 15px;
        background-color: white;
        border: 2px solid black;
        border-radius: 100px;
        transition: all 0.3s ease;
      }

      #aside-new-button:hover {
        background-color: #000;
        color: #fff;
        cursor: pointer;
      }
      summary {
        display: flex;
        justify-content: space-between;
        padding: 15px;
      }

      .card-container {
        background-color: white;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;

        box-sizing: border-box;
      }

      .card-left {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .profile {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        overflow: hidden;
        background-color: transparent;
      }

      .username {
        font-weight: 500;
        color: #333;
      }

      .stats {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 8px;
        color: #777;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 14px;
      }

      .icon {
        width: 18px;
        height: 18px;
      }

      .card-right {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0px 16px;
        align-items: flex-start;
      }

      .post-info {
        grid-column: 1;
        text-align: left;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }

      .letter-box {
        grid-column: 2;
        width: 50px;
        height: 50px;
        border: 1px solid #ccc;
        border-radius: 4px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 16px;
        align-self: flex-start;
      }

      .letter {
        font-size: 24px;
        font-weight: bold;
        color: #333;
      }

      .post-title {
        font-size: 16px;
        margin: 0;
        font-weight: 500;
        color: #333;
      }

      .post-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #888;
        font-size: 14px;
      }

      .status {
        color: #fca130;
      }

      .separator {
        margin: 0 4px;
      }
    </style>
  </head>

  <body>
    <header>
      <div id="left-side">
        <div id="acount-logo"></div>
        <a href="#" id="apps"> <img src="images/apps.svg" alt="" /> </a>
        <a href="#" id="apps"> <img src="images/info.svg" alt="" /> </a>
      </div>
      <div id="searchbar">
        <a href="#" id="apps"> <img src="images/apps.svg" alt="" /> </a>
        <input type="text" name="" id="" placeholder="shearch" />
      </div>
      <div id="right-side">
        <div id="app-logo">
          <img src="images/icon.png" width="40px" height="40px" alt="" />
        </div>
        <div id="drawer-logo">
          <img src="images/menu-burger.svg" width="40px" height="40px" alt="" />
        </div>
      </div>
    </header>
    <main>
      <aside>
        <h3>Your Name</h3>
        <a id="aside-new-button" href="">+ New Share </a>
      </aside>
      <section>
        <details>
          <summary>
            <div>III ___---___</div>
            <div>ss</div>
          </summary>
          <p>
            This is the hidden content that gets revealed when the summary is
            clicked by the user.
          </p>
        </details>
        <div class="card-container">
          <div class="card-left">
            <div class="profile">
              <div class="avatar">
                <svg
                  width="100%"
                  height="100%"
                  viewBox="0 0 40 40"
                  version="1.1"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <circle cx="20" cy="15" r="7" fill="#555" />
                  <circle cx="20" cy="38" r="12" fill="#555" />
                </svg>
              </div>
              <span class="username">Nagm</span>
            </div>

            <div class="stats">
              <div class="stat-item">
                <svg
                  class="icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M12 20V10M18 20V4M6 20v-6"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                <span class="value">0</span>
              </div>
              <div class="stat-item">
                <svg
                  class="icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                <span class="value">0</span>
              </div>
            </div>
          </div>

          <div class="card-right">
            <div class="letter-box">
              <span class="letter">ب</span>
            </div>
            <div class="post-info">
              <h3 class="post-title">(بلا عنوان)</h3>
              <div class="post-meta">
                <span class="status">مسودة</span>
                <span class="separator">•</span>
                <span class="date">25 مايو</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
