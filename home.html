<!doctype html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css">
  <body class="home-body">
    <header class="home-header">
      <div id="right-side">
        <div id="drawer-logo" onclick="onMenuClicked()">
          <img src="images/menu-burger.svg" width="40px" height="40px" alt="" />
        </div>
        <div id="app-logo">
          <img src="images/icon.png" width="40px" height="40px" alt="" />
        </div>
      </div>
      <div id="searchbar">
        <label for="search"
          ><la href="#" id="apps"> <img src="images/search.png" alt="" /> </la
        ></label>
        <input type="text" name="search" id="search" placeholder="search" />
      </div>
      <div id="left-side">
        <div id="acount-logo"></div>
      </div>
    </header>
    <main class="home-main">
      <aside id="home-aside">
        <h3>Your Name</h3>
        <a href="create-artical.html">+ New Share </a>
      </aside>
      <section class="content-section">
        <details>
          <summary>
            <div>Notifications</div>
          </summary>
          <p>
            This is the hidden content that gets revealed when the summary is
            clicked by the user.
          </p>
        </details>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">📄</div>
          <h3>No articles yet</h3>
          <p>
            It looks like you haven't added any articles yet. Start writing your
            first article now to display it here!
          </p>
        </div>
        <div id="list-items"></div>
      </section>
    </main>

    <footer></footer>
    <script src="home.js"></script>
  </body>
</html>
