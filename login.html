<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="login-main">
      <section class="m-left-content"></section>

      <div class="m-right-content">
        <div class="bg">
          <nav class="login-nav">
            <a class="singup active-nav" href="#">SingUp</a>
            <a class="login inactive-nav" href="#">Login</a>
          </nav>

          <form id="singup-form" action="home.html" method="post">
            <label for="singup-name">User Name</label>
            <input type="text" name="name" id="singup-name" required />
            <label for="singup-email">User Email</label>
            <input type="email" name="email" id="singup-email" required />
            <label for="singup-password">User Password</label>
            <input
              type="password"
              name="password"
              id="singup-password"
              required
            />
            <label for="singup-re-password">Repate Password</label>
            <input
              type="password"
              name="password"
              id="singup-re-password"
              required
            />
            <input
              type="submit"
              name="submit"
              id="singup-submit"
              onclick="goToHome(false)"
            />
          </form>
          <form id="login-form" action="home.html" method="post">
            <label for="email">User Email</label>
            <input type="email" name="email" id="email" required />
            <label for="password">User Password</label>
            <input type="password" name="password" id="password" required />
            <input
              type="submit"
              onclick="goToHome(true)"
              name="submit"
              id="submit"
            />
          </form>
        </div>
      </div>
    </main>
    <script>
      let singupNav = document.querySelector(".singup");
      let loginNav = document.querySelector(".login");
      let singup = document.querySelector("#singup-form");
      let login = document.querySelector("#login-form");
      singup.addEventListener("submit", (e) => {
        e.preventDefault();
      });
      singupNav.addEventListener("click", function (e) {
        singupNav.className = "active-nav";
        loginNav.className = "inactive-nav";
        login.style.display = "none";
        singup.style.display = "block";
      });

      loginNav.addEventListener("click", function (e) {
        singupNav.className = "inactive-nav";
        loginNav.className = "active-nav";
        login.style.display = "block";
        singup.style.display = "none";
      });
      
      function goToHome(isLogin) {
        if (isLogin) {
          if (validateLogin()) {
            window.location.href = "home.html";
          }
        } else {
          if (validateSignup()) {
            window.location.href = "home.html";
          }
        }
      }
      function validateSignup() {
        let username = document.getElementById("singup-name").value;
        let email = document.getElementById("singup-email").value;
        let password = document.getElementById("singup-password").value;
        let rePassword = document.getElementById("singup-re-password").value;

        if (username === "") {
          alert("Enter username");
          return false;
        }

        if (email === "") {
          alert("Enter email");
          return false;
        }

        if (password === "") {
          alert("Enter password");
          return false;
        }

        if (rePassword === "") {
          alert("Repeat password");
          return false;
        }

        if (password !== rePassword) {
          alert("Passwords not equal");
          return false;
        }

        return true;
      }

      function validateLogin() {
        let email = document.getElementById("email").value;
        let password = document.getElementById("password").value;

        if (email === "") {
          alert("Enter email");
          return false;
        }

        if (password === "") {
          alert("Enter password");
          return false;
        }

        return true;
      }
    </script>
    <script src="js/script.js"></script>
  </body>
</html>
