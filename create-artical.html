<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء مقال جديد</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-color: #ffffff;
        --text-color: #000000;
        --border-color: #000000;
        --hover-bg: #f2f2f2;
      }

      * {
        box-sizing: border-box;
        font-family: "Audiowide", sans-serif;
        font-style: normal;
        padding: 0;
        margin: 0;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .form-container {
        width: 100%;
        max-width: 600px;
        padding: 30px;
        background-color: var(--bg-color);
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.4);
      }

      .form-container h2 {
        text-align: center;
        margin-bottom: 25px;
        font-size: 24px;
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
      }

      input[type="text"],
      textarea,
      input[type="file"] {
        display: block;
        border-color: #cedced;
        border-radius: 0.25rem;
        height: auto;
        padding-left: 1rem;
        padding-right: 1rem;
        font-size: 16px;
        line-height: 1.5;
        border: 1px solid #5c5c5c;
        padding: 0.5rem;
        width: 100%;
        margin-bottom: 20px;
        margin-top: 0.25rem;
      }

      input[type="text"]:focus,
      textarea:focus {
        outline: 2px solid black;
      }

      input[type="text"]:focus,
      textarea:focus {
        background-color: var(--hover-bg);
      }

      textarea {
        resize: vertical;
        min-height: 150px;
      }

      input[type="file"] {
        padding: 8px;
        cursor: pointer;
      }

      .submit-btn {
        width: 100%;
        padding: 15px;
        background-color: var(--text-color);
        color: var(--bg-color);
        border: 1px solid var(--border-color);
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .submit-btn:hover {
        background-color: var(--bg-color);
        color: var(--text-color);
      }
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>Create New Article</h2>
      <form enctype="multipart/form-data">
        <div class="form-group">
          <label for="title">Article Title</label>
          <input
            type="text"
            id="title"
            name="title"
            placeholder="Enter a catchy title..."
            required
          />
        </div>

        <div class="form-group">
          <label for="content">Content</label>
          <textarea
            id="content"
            name="content"
            placeholder="Start writing your article here..."
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="image">Cover Image (Optional)</label>
          <input
            type="file"
            id="image"
            name="image"
            required
            accept="image/*"
          />
        </div>

        <button type="submit" onclick="addArtical()" class="submit-btn">
          Publish Article
        </button>
      </form>
    </div>
    <script src="artical.js"></script>
    <script src="script.js"></script>
  </body>
</html>
